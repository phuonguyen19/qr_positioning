<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>QR Positioning</title>
        <link rel="stylesheet" href="2505485.css"/>
        <style>
#inventory {
  position: absolute;
  top: 10px;
  left: 10px;
  background: white;
  padding: 10px;
  z-index: 9999;
}
</style>
    </head>
    <body>
        <h1>QR Positioning</h1>
        <div id="mapContainer">
        <img src="map.PNG" id="map" alt="map"/>
        <div id="marker"></div>
        </div>
        <button id="btn" onclick="toggleScanner()"> SCAN </button>

        <div id="camera"></div>
        <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
        <script src="2505485.js"></script>
        <div id="inventory"></div>
        <script>
            const items = [
  {"name":"sink","price":140,"inStock":false,"top":"11%","left":"15%"},
  {"name":"table","price":100,"inStock":true,"top":"59%","left":"56%"}
];

items.forEach(item => {
  const label = document.createElement("div");
  label.classList.add("item-label");

  label.innerHTML = `
    <div><strong>${item.name}</strong></div>
    <div>€${item.price}</div>
    <div class="${item.inStock ? "in" : "out"}">
      ${item.inStock ? "In stock" : "Out of stock"}
    </div>
  `;

  // Position it on the layout
  label.style.top = item.top;
  label.style.left = item.left;

  document.body.appendChild(label);
});
        </script>
    </body>
    </html>
