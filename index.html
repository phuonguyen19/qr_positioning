<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Positioning</title>
    <link rel="stylesheet" href="123456.css" />
</head>
<body>
    <h1>QR Positioning</h1>
    <div id="mapContainer">
        <img src="map.png" id="map" alt="map" />
        <div id="marker"></div>
    </div>
    <button id="btn" onclick="toggleScanner()">SCAN</button>

    <div id="camera"></div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="123456.js"></script>
    <script>
            // Your JSON data
const items = [
  {"name":"sink","price":140,"inStock":false,"top":"11%","left":"15%"},
  {"name":"table","price":100,"inStock":true,"top":"59%","left":"56%"}
];

// Select container
const inventoryDiv = document.getElementById("inventory");

// Loop through items
items.forEach(item => {
  // Create elements
  const name = document.createElement("p");
  const stock = document.createElement("p");
  const price = document.createElement("p");

  // Set content
  name.textContent = "Name: " + item.name;
  stock.textContent = "In store: " + (item.inStock ? "Yes" : "No");
  price.textContent = "Price: €" + item.price;

  // Append to DOM
  inventoryDiv.appendChild(name);
  inventoryDiv.appendChild(stock);
  inventoryDiv.appendChild(price);
});
        </script>
</body>
</html>
